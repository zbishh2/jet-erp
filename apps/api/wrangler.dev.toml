name = "jet-erp-api-dev"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database (local)
[[d1_databases]]
binding = "DB"
database_name = "jet-erp-db-local"
database_id = "local"
migrations_dir = "drizzle/migrations"

# KV Namespaces (local)
[[kv_namespaces]]
binding = "AUTH_CACHE"
id = "local-auth-cache"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "local-rate-limit"

# R2 Bucket (local)
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "jet-erp-attachments-local"

# Environment Variables
[vars]
ENVIRONMENT = "development"
ALLOW_DEV_AUTH = "true"
# AZURE_CLIENT_ID should be set via `wrangler secret put AZURE_CLIENT_ID`
# or as a local-only .dev.vars file, not committed to source control
KIWIPLAN_GATEWAY_URL = "https://kiwiplan.leangoapp.com"

# Local development
[dev]
port = 3001
local_protocol = "http"
